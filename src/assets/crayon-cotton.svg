  <g>
    <path d="M56 104 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z" fill="#f2c94c"/>
    <path d="M204 140 l2.4 6.4 6.4 2.4 -6.4 2.4 -2.4 6.4 -2.4 -6.4 -6.4 -2.4 6.4 -2.4 Z" fill="#f592b8"/>
    <path d="M206 306 l2.4 6.4 6.4 2.4 -6.4 2.4 -2.4 6.4 -2.4 -6.4 -6.4 -2.4 6.4 -2.4 Z" fill="#8a8fe0"/>
    <circle cx="46" cy="210" r="2.8" fill="#8a8fe0"/>
    <circle cx="214" cy="230" r="2.8" fill="#f592b8"/>
