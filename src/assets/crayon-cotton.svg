  <path d="M118 22 a12 12 0 1 0 10 19 a10 10 0 1 1 -10 -19 Z" fill="#f2c94c" opacity=".95"/>
  <path d="M146 28 c-2.4-5-10-3.4-10 1.6 c0 4.2 6.6 7.6 10 10 c3.4-2.4 10-5.8 10-10 c0-5-7.6-6.6-10-1.6 Z" fill="#f592b8"/>
